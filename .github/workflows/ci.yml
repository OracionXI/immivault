name: CI

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same branch/PR to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: immivault-frontend

# All jobs carry an `if:` guard so they only run when the triggering branch
# is a feature/* branch. On `push` events github.ref_name is the branch name;
# on `pull_request` events github.head_ref is the source branch name.
jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push'         && startsWith(github.ref_name, 'feature/')) ||
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: immivault-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Type-check ─────────────────────────────────────────────────────────
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push'         && startsWith(github.ref_name, 'feature/')) ||
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: immivault-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check types (tsc --noEmit)
        run: npx tsc --noEmit

  # ── 3. Unit Tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push'         && startsWith(github.ref_name, 'feature/')) ||
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: immivault-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: immivault-frontend/test-results/
          if-no-files-found: ignore

  # ── 4. Production Build (gates on lint + types + tests) ───────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests]
    if: >-
      (github.event_name == 'push'         && startsWith(github.ref_name, 'feature/')) ||
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/'))

    # Real secrets are used so the build succeeds as it would on Vercel.
    # All values are injected at build time — nothing is logged or exported.
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
      CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
      NEXT_PUBLIC_CONVEX_SITE_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: immivault-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (production)
        run: npm run build

      - name: Upload build artifact (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            immivault-frontend/.next/standalone
            immivault-frontend/.next/static
          retention-days: 3
