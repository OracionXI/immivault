name: CI

# Runs on feature branch pushes and on PRs targeting main.
# Production deploys are triggered manually — no auto-merge to main.
on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/frontend-v*'
      - 'feature/backend-v*'
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint, type-check, and unit test
  # ──────────────────────────────────────────────
  ci:
    name: Lint · Type Check · Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: immivault-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: immivault-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  # ──────────────────────────────────────────────
  # 2. Vercel preview deploy (PRs only)
  #    Requires VERCEL_TOKEN + VERCEL_ORG_ID +
  #    VERCEL_PROJECT_ID secrets in GitHub repo.
  # ──────────────────────────────────────────────
  deploy-preview:
    name: Vercel Preview Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    environment: preview

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: immivault-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: immivault-frontend

      - name: Build (Vercel)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: immivault-frontend

      - name: Deploy preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: immivault-frontend
